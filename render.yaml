services:
  - type: web
    name: airbnb-firetv-welcome
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: WELCOME_ADMIN_USERNAME
        sync: false
      - key: WELCOME_ADMIN_PASSWORD
        sync: false
      - key: WELCOME_SESSION_SECRET
        generateValue: true
